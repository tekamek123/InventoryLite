name: CI

on:
  push:
    branches: [ main, allFoundation ]
  pull_request:
    branches: [ main, allFoundation ]

jobs:
  # ─────────────────────────────
  # Job 1: Run unit tests
  # ─────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run unit tests
        run: npm test

  # ─────────────────────────────
  # Job 2: Build Expo Web Bundle
  # ─────────────────────────────
  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: test          # Only build if tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Export Expo Web bundle
        run: npx expo export --platform web

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: dist/
          retention-days: 7
